<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>리듬 속에 찬양을 - 이리신광교회 에디션</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0014;
            color: white;
            font-family: 'Jua', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0a0014 0%, #1a0033 50%, #0d0020 100%);
            overflow: hidden;
        }

        .bg-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0.3;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        #info {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 15px;
        }
        #score-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
        }
        #combo-container {
            text-align: center;
            transition: transform 0.1s;
        }
        #combo-container.bump { transform: scale(1.3); }
        #combo-count {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            color: #ffdd00;
            text-shadow: 0 0 15px #ffaa00, 0 0 30px #ff6600;
            line-height: 1;
        }
        #combo-label {
            font-size: 0.8rem;
            color: #ffaa00;
            letter-spacing: 3px;
        }
        #song-title-display {
            font-size: 0.9rem;
            color: #aaa;
            text-align: right;
        }

        .lane {
            position: absolute;
            bottom: 0;
            width: 25%;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: background 0.08s;
            z-index: 2;
        }
        .lane::before {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
        }
        #lane-0::before { background: linear-gradient(to top, #ff3366, transparent 60%); }
        #lane-1::before { background: linear-gradient(to top, #33ff66, transparent 60%); }
        #lane-2::before { background: linear-gradient(to top, #3366ff, transparent 60%); }
        #lane-3::before { background: linear-gradient(to top, #ffcc00, transparent 60%); }

               .lane.flash-0 { background: radial-gradient(ellipse at bottom, rgba(255,51,102,0.3), transparent 70%); }
        .lane.flash-1 { background: radial-gradient(ellipse at bottom, rgba(51,255,102,0.3), transparent 70%); }
        .lane.flash-2 { background: radial-gradient(ellipse at bottom, rgba(51,102,255,0.3), transparent 70%); }
        .lane.flash-3 { background: radial-gradient(ellipse at bottom, rgba(255,204,0,0.3), transparent 70%); }


        .hit-zone {
            position: absolute;
            bottom: 12%;
            width: 100%;
            height: 8%;
            pointer-events: none;
            z-index: 3;
        }
        .hit-zone-line {
            position: absolute;
            bottom: 12%;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 4;
            pointer-events: none;
        }
        #lane-0 .hit-zone { background: radial-gradient(ellipse, rgba(255,51,102,0.15), transparent); }
        #lane-1 .hit-zone { background: radial-gradient(ellipse, rgba(51,255,102,0.15), transparent); }
        #lane-2 .hit-zone { background: radial-gradient(ellipse, rgba(51,102,255,0.15), transparent); }
        #lane-3 .hit-zone { background: radial-gradient(ellipse, rgba(255,204,0,0.15), transparent); }

        #lane-0 .hit-zone-line { background: linear-gradient(90deg, transparent, #ff3366, transparent); box-shadow: 0 0 10px #ff3366; }
        #lane-1 .hit-zone-line { background: linear-gradient(90deg, transparent, #33ff66, transparent); box-shadow: 0 0 10px #33ff66; }
        #lane-2 .hit-zone-line { background: linear-gradient(90deg, transparent, #3366ff, transparent); box-shadow: 0 0 10px #3366ff; }
        #lane-3 .hit-zone-line { background: linear-gradient(90deg, transparent, #ffcc00, transparent); box-shadow: 0 0 10px #ffcc00; }

        .lane-icon {
            position: absolute;
            bottom: 2%;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            pointer-events: none;
            z-index: 5;
            opacity: 0.6;
        }

        .note {
            position: absolute;
            width: 80%;
            left: 10%;
            border-radius: 8px;
            pointer-events: none;
            z-index: 5;
        }
        .note.short { height: 18px; }
        .note.lane-c0 { background: linear-gradient(135deg, #ff3366, #ff6699); box-shadow: 0 0 12px #ff3366, 0 2px 8px rgba(255,51,102,0.5); }
        .note.lane-c1 { background: linear-gradient(135deg, #33ff66, #66ff99); box-shadow: 0 0 12px #33ff66, 0 2px 8px rgba(51,255,102,0.5); }
        .note.lane-c2 { background: linear-gradient(135deg, #3366ff, #6699ff); box-shadow: 0 0 12px #3366ff, 0 2px 8px rgba(51,102,255,0.5); }
        .note.lane-c3 { background: linear-gradient(135deg, #ffcc00, #ffdd55); box-shadow: 0 0 12px #ffcc00, 0 2px 8px rgba(255,204,0,0.5); }
        .note.long { opacity: 0.85; border-radius: 8px; }
        .note.hit-glow {
            background: rgba(255,255,255,0.9) !important;
            box-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.6) !important;
        }

        .judge-effect {
            position: absolute;
            bottom: 22%;
            width: 100%;
            text-align: center;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 20;
            animation: judgePop 0.6s forwards;
        }
        .judge-effect.perfect { color: #ffdd00; text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff6600; }
        .judge-effect.great { color: #00ffcc; text-shadow: 0 0 15px #00ddaa; }
        .judge-effect.good { color: #88aaff; text-shadow: 0 0 10px #6688dd; }
        .judge-effect.miss { color: #ff4444; text-shadow: 0 0 10px #cc0000; }

        @keyframes judgePop {
            0% { opacity: 1; transform: translateY(0) scale(1.2); }
            30% { transform: translateY(-15px) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
        }

        .hit-burst {
            position: absolute;
            bottom: 12%;
            left: 50%;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            animation: burstAnim 0.4s forwards;
        }
        .hit-burst.lane-c0 { background: radial-gradient(circle, rgba(255,51,102,0.8), transparent 70%); }
        .hit-burst.lane-c1 { background: radial-gradient(circle, rgba(51,255,102,0.8), transparent 70%); }
        .hit-burst.lane-c2 { background: radial-gradient(circle, rgba(51,102,255,0.8), transparent 70%); }
        .hit-burst.lane-c3 { background: radial-gradient(circle, rgba(255,204,0,0.8), transparent 70%); }

        @keyframes burstAnim {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        #countdown {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 8rem;
            color: #ffdd00;
            text-shadow: 0 0 40px #ffaa00, 0 0 80px #ff6600;
        }
        #countdown.show { display: flex; }
        .cd-anim { animation: cdPop 0.8s forwards; }
        @keyframes cdPop {
            0% { transform: scale(2); opacity: 0; }
            20% { transform: scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; }
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, #1a0044 0%, #0a0014 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        #start-screen h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            background: linear-gradient(135deg, #ffdd00, #ff6600, #ff3366, #cc33ff, #3366ff, #00ddff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradShift 3s ease infinite;
            margin-bottom: 5px;
            cursor: pointer;
        }
        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        #start-screen .subtitle {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 30px;
        }
        #start-screen .church-name {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .song-select-area {
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .song-select-area h3 {
            color: #ffdd00;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        .song-item {
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .song-item:hover { background: rgba(255,255,255,0.15); }
        .song-item.selected {
            border-color: #ffdd00;
            background: rgba(255,221,0,0.15);
        }
        .song-item .song-name { font-size: 1rem; color: #fff; }
        .song-item .song-meta { font-size: 0.75rem; color: #aaa; text-align: right; }
        .song-item .song-meta .no-pattern { color: #ff6666; }

        .btn {
            padding: 14px 36px;
            font-size: 1.2rem;
            font-family: 'Jua', sans-serif;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            margin: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn-play {
            background: linear-gradient(135deg, #00ddff, #00ff88);
            box-shadow: 0 4px 20px rgba(0,221,255,0.4);
        }
        .btn-play:disabled {
            background: #444;
            box-shadow: none;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        .btn-admin {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            box-shadow: 0 4px 20px rgba(255,170,0,0.4);
            font-size: 0.9rem;
            padding: 10px 24px;
        }

        #rank-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, #1a0044 0%, #0a0014 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            overflow-y: auto;
        }
        #rank-screen h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .result-grade {
            font-size: 4rem;
            margin: 10px 0;
            animation: gradeAppear 0.8s forwards;
        }
        @keyframes gradeAppear {
            0% { transform: scale(3) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        #final-score {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2rem;
            color: #ffdd00;
            text-shadow: 0 0 15px #ffaa00;
        }
        .result-stats {
            display: flex;
            gap: 15px;
            margin: 8px 0;
            font-size: 0.85rem;
            color: #aaa;
            flex-wrap: wrap;
            justify-content: center;
        }
        .result-stats span { color: #fff; }
        .result-song-title {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        #user-name {
            padding: 12px 20px;
            font-size: 1.1rem;
            font-family: 'Jua', sans-serif;
            border-radius: 50px;
            border: 2px solid #ffdd00;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-align: center;
            width: 250px;
            outline: none;
            margin-top: 5px;
        }
        #user-name::placeholder { color: #666; }

        #rank-list {
            margin-top: 15px;
            width: 90%;
            max-width: 350px;
            max-height: 180px;
            overflow-y: auto;
        }
        #rank-list h3 { color: #ffdd00; margin-bottom: 8px; }
        .rank-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }
        .rank-entry:nth-child(odd) { background: rgba(255,255,255,0.05); }
        .rank-1 { color: #ffdd00; font-weight: bold; }
        .rank-2 { color: #cccccc; }
        .rank-3 { color: #cc8844; }

        #stop-record-btn {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 150;
        }
        #record-output {
            display: none;
            position: absolute;
            inset: 5%;
            background: #1a1a2e;
            color: #fff;
            z-index: 200;
            padding: 20px;
            flex-direction: column;
            border-radius: 16px;
            border: 2px solid #ffaa00;
        }
        #record-output h3 { color: #ffaa00; margin-bottom: 10px; font-size: 0.95rem; }
        #output-text {
            width: 100%;
            flex-grow: 1;
            font-family: monospace;
            font-size: 0.75rem;
            background: #0d0d1a;
            color: #00ff88;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            resize: none;
        }

        #progress-bar-container {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 10;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3366, #ffdd00, #00ddff);
            transition: width 0.3s;
        }

        .center-miss {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3rem;
            color: rgba(255,68,68,0.8);
            z-index: 25;
            pointer-events: none;
            animation: missFade 0.6s forwards;
        }
        @keyframes missFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-30px); }
        }

        .combo-milestone {
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            color: #ffdd00;
            text-shadow: 0 0 30px #ffaa00;
            z-index: 25;
            pointer-events: none;
            animation: milestonePop 1s forwards;
        }
        @keyframes milestonePop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

<div id="game-container">

    <div id="info">
        <div><div id="score-text">0</div></div>
        <div id="combo-container" style="display:none;">
            <div id="combo-count">0</div>
            <div id="combo-label">C O M B O</div>
        </div>
        <div id="song-title-display"></div>
    </div>

    <div id="progress-bar-container"><div id="progress-bar"></div></div>

    <div id="countdown"><span id="cd-text"></span></div>

    <div class="lane" id="lane-0" style="left:0%">
        <div class="hit-zone"></div><div class="hit-zone-line"></div><div class="lane-icon">🎵</div>
    </div>
    <div class="lane" id="lane-1" style="left:25%">
        <div class="hit-zone"></div><div class="hit-zone-line"></div><div class="lane-icon">🎶</div>
    </div>
    <div class="lane" id="lane-2" style="left:50%">
        <div class="hit-zone"></div><div class="hit-zone-line"></div><div class="lane-icon">🎵</div>
    </div>
    <div class="lane" id="lane-3" style="left:75%">
        <div class="hit-zone"></div><div class="hit-zone-line"></div><div class="lane-icon">🎶</div>
    </div>

    <button class="btn btn-admin" id="stop-record-btn" onclick="endGame()">⏹️ 녹화 완료</button>

    <!-- 시작 화면 -->
    <div id="start-screen">
        <h1 id="title-btn">🎹 박자왕 새빛이</h1>
        <p class="subtitle">리듬에 맞춰 찬양해요!</p>
        <p class="church-name">이리신광교회 아동국 어린이 잔치</p>

        <div class="song-select-area">
            <h3>🎼 곡을 선택하세요</h3>
            <div class="song-list" id="song-list"></div>
        </div>

        <button class="btn btn-play" id="btn-start" onclick="startGame(false)">🎮 게임 시작</button>
        <button class="btn btn-admin" id="btn-admin" onclick="startGame(true)" style="display:none;">🛠️ 패턴 녹화</button>
    </div>

    <!-- 결과 화면 -->
    <div id="rank-screen">
        <h1>👏 찬양 완료!</h1>
        <div class="result-song-title" id="result-song-title"></div>
        <div class="result-grade" id="result-grade">🌟</div>
        <div id="final-score">0점</div>
        <div class="result-stats">
            <div>PERFECT <span id="stat-perfect">0</span></div>
            <div>GREAT <span id="stat-great">0</span></div>
            <div>GOOD <span id="stat-good">0</span></div>
            <div>MISS <span id="stat-miss">0</span></div>
        </div>
        <div class="result-stats">
            <div>최대콤보 <span id="stat-maxcombo">0</span></div>
        </div>
        <input type="text" id="user-name" placeholder="이름을 입력하세요" maxlength="10">
        <button class="btn btn-play" id="save-btn" onclick="saveRank()">🏆 랭킹 등록</button>
        <div id="rank-list"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:white; font-size:0.9rem; margin-top:10px;">🏠 처음으로</button>
    </div>

    <!-- 녹화 결과 -->
    <div id="record-output">
        <h3>📋 녹화 완료! 아래 noteMap 배열을 복사하여<br>songDatabase의 해당 곡 noteMap에 붙여넣으세요</h3>
        <textarea id="output-text"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px; justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-play" onclick="copyOutput()" style="font-size:0.9rem; padding:10px 20px;">📋 복사하기</button>
            <button class="btn btn-admin" onclick="location.reload()" style="font-size:0.9rem; padding:10px 20px;">닫기</button>
        </div>
    </div>
</div>

<audio id="bgm" preload="auto"></audio>

<script>
// ===================================================================
//  곡 데이터베이스
//  - id: 랭킹 구분용 (곡마다 고유하게)
//  - noteMap이 비어있으면 일반유저는 플레이 불가, 관리자만 녹화 가능
//  - 곡 추가: 아래 배열에 새 객체를 추가하면 자동으로 목록에 표시됨
// ===================================================================
const songDatabase = [
    {
        id: "song1",
        title: "우리가 주를 더욱 사랑하고",
        artist: "WELOVE",
        audioUrl: "https://dl.dropboxusercontent.com/scl/fi/d3f881q1xxmd4hckq165z/music.mp3?rlkey=fotm5jpm4lrdffzydx589bl0y&st=v3l8tbqp&dl=1",
        noteMap: [
            { time: 7023, lane: 3, dur: 2711 },
            { time: 9896, lane: 3, dur: 0 },
            { time: 10123, lane: 2, dur: 0 },
            { time: 10334, lane: 1, dur: 0 },
            { time: 10540, lane: 0, dur: 3205 },
            { time: 14669, lane: 1, dur: 0 },
            { time: 15472, lane: 1, dur: 0 },
            { time: 16335, lane: 2, dur: 312 },
            { time: 17195, lane: 2, dur: 0 },
            { time: 18035, lane: 3, dur: 288 },

// ===================================================================
//  Web Audio API 타격음
// ===================================================================
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playHitSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'perfect') {
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    } else if (type === 'great') {
        osc.frequency.value = 660;
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    } else if (type === 'good') {
        osc.frequency.value = 440;
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    } else {
        osc.frequency.value = 200;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    }

    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
}

// ===================================================================
//  포인터 이벤트 (멀티터치 대응)
// ===================================================================
function setupPointerEvents() {
    for (let i = 0; i < 4; i++) {
        const lane = document.getElementById('lane-' + i);
        lane.addEventListener('pointerdown', (e) => handlePointerDown(i, e), { passive: false });
        lane.addEventListener('pointerup', (e) => handlePointerUp(i, e), { passive: false });
        lane.addEventListener('pointercancel', (e) => handlePointerUp(i, e), { passive: false });
        lane.addEventListener('pointerleave', (e) => handlePointerUp(i, e), { passive: false });
        lane.style.touchAction = 'none';
    }
}

    function handlePointerDown(laneIdx, e) {
        e.preventDefault();
        if (!gameStarted && !isRecording) return;
        initAudio();
        isLanePressed[laneIdx] = true;
        document.getElementById('lane-' + laneIdx).classList.add('flash-' + laneIdx);
        // 누르는 동안 해당 레인의 노트를 밝게
       

        if (isRecording) {
            recordingStartTimes[laneIdx] = bgm.currentTime * 1000;
        } else {
            checkHit(laneIdx);
        }
    }


    function handlePointerUp(laneIdx, e) {
        if (!gameStarted && !isRecording) return;
        isLanePressed[laneIdx] = false;
        document.getElementById('lane-' + laneIdx).classList.remove('flash-' + laneIdx);
        // 노트 밝기 원래대로
   

        if (isRecording && recordingStartTimes[laneIdx] !== null) {
            const start = recordingStartTimes[laneIdx];
            const end = bgm.currentTime * 1000;
            const dur = Math.round(end - start);
            recordedNotes.push({ time: Math.round(start), lane: laneIdx, dur: dur > 300 ? dur : 0 });
            recordingStartTimes[laneIdx] = null;
        }
    }


// ===================================================================
//  카운트다운
// ===================================================================
function doCountdown() {
    return new Promise(resolve => {
        const cdEl = document.getElementById('countdown');
        const cdText = document.getElementById('cd-text');
        cdEl.classList.add('show');
        let count = 3;

        function tick() {
            if (count > 0) {
                cdText.innerHTML = `<span class="cd-anim">${count}</span>`;
                count--;
                setTimeout(tick, 800);
            } else {
                cdText.innerHTML = `<span class="cd-anim">🎵</span>`;
                setTimeout(() => {
                    cdEl.classList.remove('show');
                    resolve();
                }, 600);
            }
        }
        tick();
    });
}

        document.getElementById('stop-record-btn').style.display = 'block';
        bgm.play();
        bgm.onended = () => endGame();
        gameStarted = true;
        return;
    }

    await doCountdown();
    gameStarted = true;
    noteIndex = 0;
    animationId = requestAnimationFrame(gameLoop);
    bgm.play();
    bgm.onended = () => endGame();
}

function endGame() {
    bgm.pause();
    gameStarted = false;
    cancelAnimationFrame(animationId);

    activeNotes.forEach(n => n.element.remove());
    activeNotes = [];

    if (isRecording) {
        document.getElementById('record-output').style.display = 'flex';
document.getElementById('output-text').value =
    `noteMap: [\n    ${recordedNotes.map(n => JSON.stringify(n)).join(',\n    ')}\n]`;
    } else {
        document.getElementById('rank-screen').style.display = 'flex';
        document.getElementById('result-song-title').innerText = '🎵 ' + songDatabase[selectedSongIndex].title;
        document.getElementById('final-score').innerText = score + '점';
        document.getElementById('stat-perfect').innerText = judgeCounts.perfect;
        document.getElementById('stat-great').innerText = judgeCounts.great;
        document.getElementById('stat-good').innerText = judgeCounts.good;
        document.getElementById('stat-miss').innerText = judgeCounts.miss;
        document.getElementById('stat-maxcombo').innerText = maxCombo;

        const total = currentNoteMap.length;
        const ratio = total > 0 ? (judgeCounts.perfect + judgeCounts.great + judgeCounts.good) / total : 0;
        let grade = '⭐';
        if (judgeCounts.miss === 0 && ratio >= 0.95) grade = '👑 SSS';
        else if (ratio >= 0.9) grade = '🌟 SS';
        else if (ratio >= 0.8) grade = '⭐ S';
        else if (ratio >= 0.65) grade = '🅰️ A';
        else if (ratio >= 0.5) grade = '🅱️ B';
        else grade = '💪 C';
        document.getElementById('result-grade').innerText = grade;

        displayRanks();
    }
}

// ===================================================================
//  판정 & 히트
// ===================================================================
function checkHit(laneIdx) {
    let currentTime = bgm.currentTime * 1000;
    let targetIdx = -1, minDiff = GOOD_RANGE;

    for (let i = 0; i < activeNotes.length; i++) {
        let n = activeNotes[i];
        if (n.data.lane === laneIdx && !n.isBeingHeld) {
            let diff = Math.abs(n.data.time - currentTime);
            if (diff < minDiff) { minDiff = diff; targetIdx = i; }
        }
    }

    if (targetIdx !== -1) {
        let n = activeNotes[targetIdx];
        let diff = Math.abs(n.data.time - currentTime);
        let judgeType, judgeScore;

        if (diff <= PERFECT_RANGE) { judgeType = 'perfect'; judgeScore = 20; }
        else if (diff <= GREAT_RANGE) { judgeType = 'great'; judgeScore = 15; }
        else { judgeType = 'good'; judgeScore = 10; }

        if (n.data.dur === 0) {
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            score += judgeScore + combo;
            judgeCounts[judgeType]++;
            n.element.classList.add('hit-glow');
            n.element.remove();
            activeNotes.splice(targetIdx, 1);
            showJudgeEffect(laneIdx, judgeType);
            showHitBurst(laneIdx);
            playHitSound(judgeType);
        } else {
            n.isBeingHeld = true;
            n.element.classList.add('hit-glow');
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            score += judgeScore;
            judgeCounts[judgeType]++;
            showJudgeEffect(laneIdx, judgeType);
            showHitBurst(laneIdx);
            playHitSound(judgeType);
        }
        updateDisplay();
    }
}

function triggerMiss(laneIdx) {
    combo = 0;
    judgeCounts.miss++;
    showJudgeEffect(laneIdx, 'miss');
    playHitSound('miss');

    const cm = document.createElement('div');

    cm.innerText = 'MISS';
    document.getElementById('game-container').appendChild(cm);
    setTimeout(() => cm.remove(), 600);

    updateDisplay();
}

        comboContainer.style.display = 'block';
        comboCountEl.innerText = combo;
        comboContainer.classList.remove('bump');
        void comboContainer.offsetWidth;
        comboContainer.classList.add('bump');

        if (combo > 0 && combo % 50 === 0) {
            showComboMilestone(combo);
        }
    } else {
        comboContainer.style.display = 'none';
    }
}

// ===================================================================
//  게임 루프
// ===================================================================
function gameLoop() {
    if (!gameStarted) return;
    let currentTime = bgm.currentTime * 1000;
    let hitZoneY = window.innerHeight * 0.88;

    if (bgm.duration) {
        document.getElementById('progress-bar').style.width = ((bgm.currentTime / bgm.duration) * 100) + '%';
    }

    while (noteIndex < currentNoteMap.length && currentTime >= currentNoteMap[noteIndex].time - fallDuration) {
        spawnNote(currentNoteMap[noteIndex++]);
    }

    for (let i = activeNotes.length - 1; i >= 0; i--) {
        let n = activeNotes[i];
        let progress = (currentTime - (n.data.time - fallDuration)) / fallDuration;

        if (n.isBeingHeld) {
            if (!isLanePressed[n.data.lane] || currentTime > n.data.time + n.data.dur) {
                let completed = currentTime >= n.data.time + n.data.dur - 100;
                n.element.remove();
                activeNotes.splice(i, 1);
                if (!completed) {
                    combo = 0;
                    updateDisplay();
                } else {
                    score += 30;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    showJudgeEffect(n.data.lane, 'perfect');
                    updateDisplay();
                }
            } else {
                score += 1;
                let remainH = Math.max(0, ((n.data.time + n.data.dur - currentTime) / fallDuration) * hitZoneY);
                n.element.style.height = remainH + 'px';
                n.element.style.top = (hitZoneY - remainH) + 'px';
                updateDisplay();
            }
        } else {
            let currentY = progress * hitZoneY;
            if (n.data.dur === 0) {
                n.element.style.top = currentY + 'px';
            } else {
                let noteH = (n.data.dur / fallDuration) * hitZoneY;
                n.element.style.top = (currentY - noteH) + 'px';
            }

            if (currentTime > n.data.time + GOOD_RANGE) {
                n.element.remove();
                activeNotes.splice(i, 1);
                triggerMiss(n.data.lane);
            }
        }
    }

    animationId = requestAnimationFrame(gameLoop);
}

function spawnNote(data) {
    const lane = document.getElementById('lane-' + data.lane);
    const noteEl = document.createElement('div');
    const colorClass = 'lane-c' + data.lane;

    if (data.dur === 0) {
        noteEl.className = 'note short ' + colorClass;
    } else {
        noteEl.className = 'note long ' + colorClass;
        let h = (data.dur / fallDuration) * window.innerHeight * 0.88;
        noteEl.style.height = h + 'px';
    }

    lane.appendChild(noteEl);
    activeNotes.push({ element: noteEl, data: data, isBeingHeld: false });
}

// ===================================================================
//  랭킹 (곡별 분리)
// ===================================================================
async function saveRank() {
    const name = document.getElementById('user-name').value.trim() || "무명성도";
    const btn = document.getElementById('save-btn');
    const songId = songDatabase[selectedSongIndex].id;
    btn.disabled = true;
    btn.innerText = "등록 중...";

    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            name: name,
            score: score,
            song: songId
        })
    });

    setTimeout(() => {
        displayRanks();
        btn.disabled = false;
        btn.innerText = "🏆 랭킹 등록";
    }, 2500);
}

async function displayRanks() {
    const listDiv = document.getElementById('rank-list');
    const songId = songDatabase[selectedSongIndex].id;
    try {
        const res = await fetch(SCRIPT_URL + '?song=' + encodeURIComponent(songId));
        const ranks = await res.json();
        if (ranks.length === 0) {
            listDiv.innerHTML = '<h3>🏆 랭킹</h3><p style="color:#888; font-size:0.9rem;">아직 기록이 없습니다. 첫 번째 도전자가 되세요!</p>';
            return;
        }
        listDiv.innerHTML = '<h3>🏆 ' + songDatabase[selectedSongIndex].title + ' TOP 10</h3>' +
            ranks.map((r, i) => {
                let cls = '';
                if (i === 0) cls = 'rank-1';
                else if (i === 1) cls = 'rank-2';
                else if (i === 2) cls = 'rank-3';
                return `<div class="rank-entry ${cls}"><span>${['🥇','🥈','🥉'][i] || (i+1)+'위'} ${r.name}</span><span>${r.score}점</span></div>`;
            }).join('');
    } catch (e) {
        listDiv.innerHTML = '<p style="color:#888;">랭킹을 불러올 수 없습니다</p>';
    }
}

function copyOutput() {
    const textarea = document.getElementById('output-text');
    textarea.select();
    document.execCommand('copy');
    alert('클립보드에 복사되었습니다!');
}
